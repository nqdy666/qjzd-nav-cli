stages:
  - build
  - deploy

variables:
  DOCS_OUTPUT_DIR: "dist"
  PNPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"

build-docs:
  stage: build
  image: harbor.nianqin.vip/proxy/node:24-alpine
  before_script:
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache git python3 make g++
    - corepack enable
    - pnpm config set registry $PNPM_CONFIG_REGISTRY
    - pnpm install --frozen-lockfile || pnpm install
  script:
    - pnpm run docs:build
  artifacts:
    paths:
      - docs/.vitepress/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
# - if: $CI_COMMIT_TAG =~ /^v/

# 部署服务器配置 (分组变量)
# 每台服务器一组变量，N 从 1 开始递增
# DEPLOY_SERVER_1_NAME: 服务器名称
# DEPLOY_SERVER_1_HOST: 服务器地址
# DEPLOY_SERVER_1_USER: SSH 用户
# DEPLOY_SERVER_1_PORT: SSH 端口 (可选，默认 22)
# DEPLOY_SERVER_1_PATH: 部署目录
# DEPLOY_SERVERS_COUNT: 服务器数量

deploy-docs:
  stage: deploy
  image: alpine:latest
  before_script:
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache openssh-client coreutils
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - |
      DEPLOY_COUNT=0
      for i in $(seq 1 99); do
        eval "HOST_VAL=\$DEPLOY_SERVER_${i}_HOST"
        [ -n "$HOST_VAL" ] && DEPLOY_COUNT=$i
      done

      [ "$DEPLOY_COUNT" -eq 0 ] && echo "No servers configured, skipping" && exit 0

      echo "=== Deploying to $DEPLOY_COUNT server(s) ==="

      for i in $(seq 1 "$DEPLOY_COUNT"); do
        eval "NAME=\$DEPLOY_SERVER_${i}_NAME"
        eval "HOST=\$DEPLOY_SERVER_${i}_HOST"
        eval "USER=\$DEPLOY_SERVER_${i}_USER"
        eval "PORT=\$DEPLOY_SERVER_${i}_PORT"
        eval "DEST=\$DEPLOY_SERVER_${i}_PATH"
        eval "KEY=\$DEPLOY_SERVER_${i}_SSH_KEY"

        [ -z "$PORT" ] && PORT=22
        [ -z "$HOST" ] && continue
        [ -z "$KEY" ] && echo "--- $NAME: SSH_KEY is empty, skipping ---" && continue

        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        printf '%s\n' "$KEY" | sed 's/\r$//' > ~/.ssh/deploy_key_$i
        chmod 600 ~/.ssh/deploy_key_$i

        # 检查密钥文件是否有效
        if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key_$i 2>/dev/null; then
          echo "--- $NAME: Invalid SSH key format ---"
          rm -f ~/.ssh/deploy_key_$i
          continue
        fi

        echo "--- Deploying to $NAME ($HOST:$PORT) ---"
        ssh -p "$PORT" -i ~/.ssh/deploy_key_$i -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p $DEST"
        scp -r -P "$PORT" -i ~/.ssh/deploy_key_$i -o StrictHostKeyChecking=no \
          docs/.vitepress/dist/* "$USER@$HOST:$DEST/"
        echo "--- $NAME done ---"
        rm -f ~/.ssh/deploy_key_$i
      done

      echo "=== All deployments completed ==="
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
